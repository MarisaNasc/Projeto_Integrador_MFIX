<!DOCTYPE html>
<html>
<head>
    <title>DW MFIX</title>

    <style>
        body {
            font-family: Arial;
            background: #1e1e2f;
            color: white;
            text-align: center;
        }

        .card {
            background: #2a2a40;
            padding: 20px;
            margin: 20px;
            border-radius: 10px;
            display: inline-block;
        }

        button {
            padding: 10px 20px;
            background: #4CAF50;
            border: none;
            color: white;
            cursor: pointer;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
        }

        .modal-content {
            background: white;
            color: black;
            margin: 10% auto;
            padding: 20px;
            width: 60%;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<h1>📊 Dashboard DW - MFIX</h1>

<div class="card">
    <h2>Total Movimentações</h2>
    <p>{{ kpi[0].total }}</p>
</div>

<br>

<button onclick="abrirModal()">Ver Produtos</button>

<div id="modal" class="modal">
    <div class="modal-content">

        <h2>Produtos mais movimentados</h2>

        <table border="1" width="100%">
            <tr>
                <th>Produto</th>
                <th>Total</th>
            </tr>

            {% for p in produtos %}
            <tr>
                <td>{{ p.nome }}</td>
                <td>{{ p.total }}</td>
            </tr>
            {% endfor %}
        </table>

        <br>
        <button onclick="fecharModal()">Fechar</button>
    </div>
</div>

<script>
function abrirModal() {
    document.getElementById("modal").style.display = "block";
}

function fecharModal() {
    document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
